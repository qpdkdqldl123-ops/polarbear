<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 구출 캠페인</title>
    
    <style>
        :root {
            /* --- 퀴즈(파트 1) 전용 색상 변수 --- */
            --quiz-primary: #ff4d4d;
            --quiz-btn-bg: rgba(255, 255, 255, 0.9);

            /* --- 기부 시스템(파트 2) 전용 색상 변수 --- */
            --iob-primary: #008ecc;
            --iob-navy: #1c2d42;
            --iob-light-bg: #f8f9fa;
            --iob-border: #e9ecef;
            --iob-success: #28a745;
            --iob-warning: #f39c12;
        }

        /* 공통 바디 설정 */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; 
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        /* 상태에 따른 화면 모드 설정 */
        body.quiz-mode {
            overflow: hidden; /* 퀴즈는 스크롤 금지 */
            background: linear-gradient(180deg, #ffffff 0%, #87CEEB 100%);
        }

        body.donation-mode {
            overflow: auto; /* 기부 내역은 스크롤 허용 */
            background-color: var(--iob-light-bg);
        }

        /* =========================================
           [파트 1] 퀴즈 모드 스타일 (Three.js 북극곰)
           ========================================= */
        #quiz-app { position: relative; width: 100%; height: 100%; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #ui-container { position: relative; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .page { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; padding: 20px; }
        .active { display: flex; pointer-events: auto; }

        /* 로딩 화면 */
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; font-size: 1.5rem; font-weight: bold; pointer-events: auto; }
        .spinner { margin-bottom: 20px; width: 50px; height: 50px; border: 5px solid #fff; border-top-color: var(--quiz-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 첫 페이지 */
        #page-start { background: linear-gradient(180deg, #ffffff 0%, #87CEEB 100%); }
        .start-image { width: 100%; height: 50vh; object-fit: cover; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 15px; background-color: #ddd; }
        
        /* ⭐️ 1. 작게 만든 오디오 재생 버튼 */
        .audio-btn {
            margin-bottom: 20px;
            padding: 8px 16px; /* 크기 축소 */
            font-size: 0.85rem; /* 글자 크기 축소 */
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .audio-btn:active { transform: scale(0.95); background: rgba(0, 0, 0, 0.8); }

        .start-btn { width: 90%; padding: 20px; font-size: 1.5rem; font-weight: 800; background: var(--quiz-primary); color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 77, 77, 0.4); }

        /* ⭐️ 2. 퀴즈 페이지 (공간 확보를 위해 줄임) */
        #page-quiz { justify-content: flex-start; padding-top: 3vh; /* 조금 더 위로 붙임 */ }
        
        #question-text { 
            font-size: 1.4rem; /* 질문 글자 크기 축소 */
            font-weight: 900; line-height: 1.3; text-align: center; 
            margin-bottom: 15px; /* 하단 여백 축소 */
            word-break: keep-all; background: rgba(255,255,255,0.7); 
            padding: 12px; border-radius: 15px; 
        }
        #question-text u { text-decoration: none; box-shadow: inset 0 -12px 0 rgba(255, 77, 77, 0.3); color: var(--quiz-primary); }
        
        .options-container { 
            width: 100%; display: flex; flex-direction: column; 
            gap: 8px; /* 선지 사이 간격 축소 */
            max-height: 35vh; /* 선지가 차지하는 최대 높이 축소 */
            overflow-y: auto; 
        }
        .option-btn { 
            width: 100%; 
            padding: 14px; /* 선지 안쪽 여백 축소 */
            font-size: 1rem; /* 선지 글자 크기 축소 */
            font-weight: bold; background: var(--quiz-btn-bg); 
            border: 2px solid transparent; border-radius: 12px; 
            cursor: pointer; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        /* 결과 트리거 페이지 */
        #page-interim { justify-content: flex-start; padding-top: 15vh; }
        .fatal-btn { font-size: 2.2rem; font-weight: 900; padding: 35px 20px; width: 90%; text-align: center; word-break: keep-all; background: #660000; color: #ffcccc; border: 3px solid #ff0000; border-radius: 20px; cursor: pointer; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), inset 0 0 20px rgba(255, 0, 0, 0.5); text-shadow: 0 0 10px rgba(255, 0, 0, 1); animation: fatalPulse 0.8s infinite alternate; }
        @keyframes fatalPulse { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,0,0,0.5); } 100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,0,0,1); } }

        /* 최종 결과 페이지 */
        #page-result { justify-content: flex-start; padding-top: 10vh; }
        .result-container { display: flex; width: 100%; height: 40vh; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.8); padding: 20px; border-radius: 20px; box-sizing: border-box;}
        .gauge-section { width: 30%; height: 100%; display: flex; justify-content: center; align-items: flex-end; position: relative; }
        .gauge-bar { width: 40px; height: 100%; background: rgba(200,200,200,0.5); border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #fff; }
        .gauge-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: var(--quiz-primary); transition: height 2.5s cubic-bezier(0.1, 0.8, 0.2, 1); }
        .gauge-pointer { position: absolute; left: 60px; bottom: 0%; background: #000; color: #fff; padding: 8px 12px; border-radius: 10px; font-weight: bold; font-size: 1rem; white-space: nowrap; transition: bottom 2.5s cubic-bezier(0.1, 0.8, 0.2, 1); opacity: 0; }
        .gauge-pointer::before { content: '◀'; position: absolute; left: -12px; color: #000; }
        .stats-section { width: 65%; display: flex; flex-direction: column; justify-content: center; text-align: right; }
        .stats-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; word-break: keep-all; }
        .bear-count-wrap { font-size: 2rem; font-weight: bold; }
        #bear-number { font-size: 4.5rem; color: var(--quiz-primary); display: inline-block; transition: transform 0.3s; }
        
        /* 전환 버튼 스타일 */
        .go-donation-btn { margin-top: 30px; padding: 15px 40px; border-radius: 30px; border: none; font-weight: bold; font-size: 1.2rem; background: var(--iob-primary); color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,142,204,0.4); animation: pulseBtn 1.5s infinite; }
        @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* =========================================
           [파트 2] 기부 증명 시스템 모드 스타일
           ========================================= */
        #donation-app { display: none; width: 100%; min-height: 100vh; }
        header { background-color: #ffffff; border-bottom: 1px solid var(--iob-border); padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; text-align: center; }
        header h1 { margin: 0; font-size: 18px; color: var(--iob-navy); font-weight: 700; }
        .company-tag { font-size: 12px; color: var(--iob-primary); background: #e8f5ff; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        .container { max-width: 100%; margin: 20px auto; padding: 0 15px; }
        .section-title { font-size: 16px; color: var(--iob-navy); margin-bottom: 15px; font-weight: 600; }
        .table-container { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; margin-bottom: 30px; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; white-space: nowrap; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--iob-border); font-size: 13px; }
        th { background-color: #fafafa; color: var(--iob-navy); font-weight: 600; }
        tr.clickable-row { cursor: pointer; transition: background 0.2s; }
        tr.clickable-row:active { background-color: #f1f3f5; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-complete { background-color: #e8f5e9; color: var(--iob-success); }
        .status-pending { background-color: #fff3cd; color: var(--iob-warning); }
        .cert-link { color: var(--iob-primary); text-decoration: underline; cursor: pointer; font-weight: bold; }
        
        .btn-add { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background-color: var(--iob-primary); color: white; border-radius: 50%; text-align: center; line-height: 56px; font-size: 32px; cursor: pointer; border: none; box-shadow: 0 6px 20px rgba(0,142,204,0.5); z-index: 100; transition: all 0.2s ease; }
        .btn-add:active { transform: translateX(-50%) scale(0.95); background-color: #0077b3; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(28, 45, 66, 0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--iob-navy); border-bottom: 2px solid var(--iob-primary); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 8px; font-weight: 600; }
        .form-group select { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .phone-group { display: flex; align-items: center; gap: 10px; }
        .phone-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; text-align: center; width: 100%; }
        .phone-group span { font-weight: bold; color: #666; }
        
        .signature-container { border: 1px dashed #b1bbc4; background: #fafafa; border-radius: 6px; position: relative; margin-top: 8px; height: 160px; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        .btn-clear { position: absolute; right: 12px; bottom: 12px; background: #6c757d; color: white; border: none; padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; }
        
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; flex: 1; }
        .btn-submit { background-color: var(--iob-primary); color: white; }
        .btn-cancel { background-color: #e9ecef; color: #495057; }
        
        .receipt-img { width: 100%; border-radius: 8px; }
        .detail-info { text-align: center; margin: 15px 0; font-size: 16px; font-weight: bold; }
        .detail-sig { width: 100%; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        
        footer { text-align: center; padding: 30px 15px; margin-bottom: 80px; }
        footer p { font-size: 12px; color: #7f8c8d; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>

<body class="quiz-mode">

    <div id="quiz-app">
        <div id="canvas-container"></div>

        <div id="loading-screen">
            <div class="spinner"></div>
            <div id="loading-text">북극곰 깨우는 중... (0/7)</div>
        </div>

        <div id="ui-container">
            <div id="page-start" class="page active">
                <img src="첫페이지.jpg" alt="북극곰" class="start-image" onerror="this.src='https://via.placeholder.com/600x800?text=Image'">
                
                <audio id="bear-scream" src="크게9.mp3"></audio>
                <button class="audio-btn" onclick="playScream()">🔊 북극곰 비명소리 듣기</button>

                <button class="start-btn" onclick="startQuiz()">북극곰 구하러 가기</button>
            </div>

            <div id="page-quiz" class="page">
                <div id="question-text">질문 텍스트</div>
                <div class="options-container" id="options-container"></div>
            </div>

            <div id="page-interim" class="page">
                <button class="fatal-btn" onclick="showResult()">내가 죽인 북극곰 수는?</button>
            </div>

            <div id="page-result" class="page">
                <div class="result-container">
                    <div class="gauge-section">
                        <div class="gauge-bar"><div class="gauge-fill" id="gauge-fill"></div></div>
                        <div class="gauge-pointer" id="gauge-pointer">상위 ?%</div>
                    </div>
                    <div class="stats-section">
                        <div class="stats-title">한 달 동안<br>내가 죽인 북극곰</div>
                        <div class="bear-count-wrap"><span id="bear-number">0</span> 마리</div>
                    </div>
                </div>
                <button class="go-donation-btn" onclick="goToDonation()">북극곰 살리러 가기</button>
            </div>
        </div>
    </div>


    <div id="donation-app">
        <header>
            <h1>아이스버그 프로텍트</h1>
            <div class="company-tag">공식 대리 기부 주관: 아이오비(IOB)</div>
        </header>

        <div class="container">
            <div class="section-title">실시간 기부 현황</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>기부자(번호)</th>
                            <th>기부 캠페인명</th>
                            <th>기부 금액</th>
                            <th>기부 단체</th>
                            <th>인증번호</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody id="donation-list"></tbody>
                </table>
            </div>
        </div>

        <button class="btn-add" id="open-modal-btn">+</button>

        <div class="modal" id="signature-modal">
            <div class="modal-content">
                <div class="modal-header">기부 서명 등록 (모바일 전용)</div>
                <div class="form-group">
                    <label>기부 캠페인명</label>
                    <select id="donation-campaign">
                        <option value="북극곰 서식지 복원 캠페인">북극곰 서식지 복원 캠페인</option>
                        <option value="빙하 보존 및 기후변화 대응">빙하 보존 및 기후변화 대응</option>
                        <option value="북극곰 먹이 공급망 보호">북극곰 먹이 공급망 보호</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>기부 단체</label>
                    <select id="donation-target">
                        <option value="유니세프(UNICEF)">유니세프(UNICEF)</option>
                        <option value="그린피스">그린피스</option>
                        <option value="WWF">WWF</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>휴대폰 번호</label>
                    <div class="phone-group">
                        <input type="text" id="phone-first" value="010" readonly>
                        <span>-</span>
                        <input type="tel" id="phone-middle" maxlength="4" placeholder="0000">
                        <span>-</span>
                        <input type="tel" id="phone-last" maxlength="4" placeholder="0000">
                    </div>
                </div>
                <div class="form-group">
                    <label>서명 (화면 터치로 서명하세요)</label>
                    <div class="signature-container">
                        <canvas id="sig-canvas"></canvas>
                        <button type="button" class="btn-clear" id="sig-clear-btn">지우기</button>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button class="btn btn-cancel" id="close-modal-btn">닫기</button>
                    <button class="btn btn-submit" id="submit-btn">저장</button>
                </div>
            </div>
        </div>

        <div class="modal" id="receipt-modal">
            <div class="modal-content">
                <div class="modal-header">기부 영수증</div>
                <img src="./기부 영수증.png" alt="기부 영수증" class="receipt-img">
                <div class="modal-buttons">
                    <button class="btn btn-cancel" id="close-receipt-btn">닫기</button>
                </div>
            </div>
        </div>

        <div class="modal" id="detail-modal">
            <div class="modal-content">
                <div class="modal-header">기부 상세 정보</div>
                <div class="detail-info" id="detail-phone">010-****-****</div>
                <img id="detail-sig-img" class="detail-sig" src="" alt="서명 이미지">
                <div class="modal-buttons">
                    <button class="btn btn-cancel" id="close-detail-btn">닫기</button>
                </div>
            </div>
        </div>

        <footer>
            <p>아이오비(IOB)는 투명한 기부 문화를 증명합니다.</p>
        </footer>
    </div>


    <script>
        function playScream() {
            const audio = document.getElementById('bear-scream');
            audio.currentTime = 0; 
            audio.play();
        }

        window.goToDonation = function() {
            document.body.className = 'donation-mode';
            document.getElementById('quiz-app').style.display = 'none';
            document.getElementById('donation-app').style.display = 'block';
            window.scrollTo(0,0);
        }

        const questions = [
            { q: "일주일에 <u>배달 음식</u>을 얼마나 자주 시켜 먹나요?", options: [ { text: "주 4회 이상 (VVIP)", score: 20 }, { text: "주 2~3회 정도", score: 15 }, { text: "월 1~2회 아주 가끔", score: 5 }, { text: "거의 안 먹음 (직접 해먹음)", score: 0 } ] },
            { q: "카페에서 음료를 마실 때, <u>텀블러</u>를 챙기시나요?", options: [ { text: "귀찮아서 매일 일회용 컵", score: 20 }, { text: "일주일에 절반은 일회용 컵", score: 15 }, { text: "가끔 생각나면 텀블러 지참", score: 5 }, { text: "무조건 개인 텀블러 사용", score: 0 } ] },
            { q: "유튜브, 인스타, 넷플릭스 등 <u>영상 스트리밍</u> 시간은?", options: [ { text: "눈 떠서 잘 때까지 달고 삼", score: 20 }, { text: "하루 3~4시간 정도 시청", score: 15 }, { text: "하루 1시간 이하 시청", score: 5 }, { text: "영상보단 독서나 다른 활동", score: 0 } ] },
            { q: "가까운 거리(걸어서 15분 이내)를 갈 때 <u>주로 타는 것</u>은?", options: [ { text: "무조건 택시 부름", score: 20 }, { text: "버스 환승해서 감", score: 10 }, { text: "전동 킥보드나 따릉이", score: 5 }, { text: "이어폰 꽂고 걸어감", score: 0 } ] },
            { q: "유행이 지났거나 질린 <u>옷을 처리하는 방식</u>은?", options: [ { text: "매달 새 옷 사고 헌 옷은 버림", score: 20 }, { text: "계절마다 한 번씩 SPA 옷 구매", score: 15 }, { text: "당근마켓 등 중고거래 활용", score: 5 }, { text: "있는 옷을 최대한 오래 입음", score: 0 } ] }
        ];

        let currentQ = 0;
        let totalScore = 0;

        function goPage(pageId) {
            document.querySelectorAll('#quiz-app .page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function startQuiz() {
            document.getElementById('page-start').style.background = 'transparent';
            if(window.danceClips && window.danceClips.length > 0) window.fadeToAction(window.danceClips[0], 0);
            window.danceInterval = setInterval(window.playNextDance, 10000);

            const audio = document.getElementById('bear-scream');
            audio.pause();
            audio.currentTime = 0;

            currentQ = 0; totalScore = 0;
            renderQ();
            goPage('page-quiz');
        }

        function renderQ() {
            document.getElementById('question-text').innerHTML = questions[currentQ].q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            questions[currentQ].options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    totalScore += opt.score;
                    currentQ++;
                    if (currentQ < questions.length) renderQ();
                    else triggerDeath(); 
                };
                container.appendChild(btn);
            });
        }

        function triggerDeath() {
            goPage('page-interim');
            window.isDead = true; 
            clearInterval(window.danceInterval);
            if(window.deathClip) window.fadeToAction(window.deathClip, 0.5);
        }

        function showResult() {
            goPage('page-result');

            let topPercent = Math.max(1, 100 - totalScore); 
            let targetBears = Math.floor(totalScore * 0.15); 
            if(totalScore > 0 && targetBears === 0) targetBears = 1;

            setTimeout(() => {
                document.getElementById('gauge-fill').style.height = totalScore + '%';
                const pointer = document.getElementById('gauge-pointer');
                pointer.style.bottom = `calc(${totalScore}% - 15px)`;
                pointer.innerText = `상위 ${topPercent}% 살인범`;
                pointer.style.opacity = 1;
            }, 300);

            const bearNumEl = document.getElementById('bear-number');
            let currentBear = 0;
            
            if(targetBears === 0) {
                setTimeout(() => { bearNumEl.style.transform = 'scale(1.5)'; }, 500); return;
            }

            let intervalTime = 2000 / targetBears; 
            setTimeout(() => {
                let counter = setInterval(() => {
                    currentBear++;
                    bearNumEl.innerText = currentBear;
                    if (currentBear >= targetBears) {
                        clearInterval(counter);
                        bearNumEl.style.transform = 'scale(1.5)';
                    }
                }, intervalTime);
            }, 500);
        }
    </script>


    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        window.danceClips = []; window.deathClip = null; window.mixer = null;
        window.currentAction = null; window.isDead = false;
        let currentDanceIndex = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 9); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
        renderer.setClearColor(0x000000, 0); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        hemiLight.position.set(0, 20, 0); scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5); scene.add(dirLight);

        const manager = new THREE.LoadingManager();
        manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
            document.getElementById('loading-text').innerText = `북극곰 애니메이션 불러오는 중... (${itemsLoaded}/${itemsTotal})`;
        };
        manager.onLoad = function ( ) { document.getElementById('loading-screen').style.display = 'none'; };

        const loader = new FBXLoader(manager);
        
        loader.load('자동재생.fbx', function (object) {
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            
            // ⭐️ 3. 크기를 살짝 줄여서 화면 밖으로 나가지 않게 함 (5.5 -> 4.8)
            const scale = 4.8 / Math.max(size.x, size.y, size.z);
            object.scale.set(scale, scale, scale);
            const newBox = new THREE.Box3().setFromObject(object);
            const center = newBox.getCenter(new THREE.Vector3());
            
            // ⭐️ 3. Y축 위치를 끌어올려 곰 발이 보이도록 함 (-3.8 -> -2.8)
            object.position.set(-center.x, -2.8, -center.z); 

            scene.add(object);
            window.mixer = new THREE.AnimationMixer(object);

            if (object.animations.length > 0) window.danceClips.push(object.animations[0]);

            const dances = ['팔춤.fbx', '백덤블링.fbx', '털어.fbx', '힙합 댄스1.fbx', '힙합 댄스2.fbx'];
            dances.forEach(file => {
                loader.load(file, (animObj) => {
                    if(animObj.animations.length > 0) window.danceClips.push(animObj.animations[0]);
                });
            });

            loader.load('죽음.fbx', (animObj) => {
                if(animObj.animations.length > 0) window.deathClip = animObj.animations[0];
            });
        });

        window.fadeToAction = function(clip, duration) {
            if(!window.mixer || !clip) return;
            const previousAction = window.currentAction;
            window.currentAction = window.mixer.clipAction(clip);
            window.currentAction.reset();
            window.currentAction.play();
            if (previousAction) {
                window.currentAction.crossFadeFrom(previousAction, duration, true);
            }
        };

        window.playNextDance = function() {
            if(window.isDead || window.danceClips.length === 0) return;
            currentDanceIndex = (currentDanceIndex + 1) % window.danceClips.length;
            window.fadeToAction(window.danceClips[currentDanceIndex], 0.5);
        };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (window.mixer) window.mixer.update(delta);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

            { isDummy: true, name: "최*서", campaign: "북극 생태계 조사 지원", amount: "₩20,000", target: "유니세프(UNICEF)", certNum: "UNI-2026-0741", status: "기부 완료", timestamp: new Date("2026-06-29T09:15:00").getTime() },

            { isDummy: true, name: "조*민", campaign: "북극곰 먹이 공급망 보호", amount: "₩40,000", target: "그린피스", certNum: "GP-2026-1234", status: "기부 완료", timestamp: new Date("2026-06-26T10:20:00").getTime() }
        ];

        const listTable = document.getElementById('donation-list');
        const modal = document.getElementById('signature-modal');
        const receiptModal = document.getElementById('receipt-modal');
        const detailModal = document.getElementById('detail-modal');
        
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.strokeStyle = "#1c2d42";
            ctx.lineWidth = 3;
            ctx.lineJoin = "round"; ctx.lineCap = "round";
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        document.getElementById('sig-clear-btn').addEventListener('click', clearCanvas);

        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDraw(e) {
            isDrawing = true;
            const pos = getEventPos(e);
            ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
            if(e.cancelable) e.preventDefault();
        }

        function moveDraw(e) {
            if (!isDrawing) return;
            const pos = getEventPos(e);
            ctx.lineTo(pos.x, pos.y); ctx.stroke();
            if(e.cancelable) e.preventDefault();
        }

        function stopDraw() { isDrawing = false; }

        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', moveDraw, {passive: false});
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        window.addEventListener('mouseup', stopDraw);

        document.getElementById('open-modal-btn').addEventListener('click', () => {
            modal.style.display = 'flex';
            setTimeout(initCanvas, 50);
        });

        document.getElementById('close-modal-btn').addEventListener('click', () => {
            modal.style.display = 'none';
            document.getElementById('phone-middle').value = '';
            document.getElementById('phone-last').value = '';
            clearCanvas();
        });

        document.getElementById('close-receipt-btn').addEventListener('click', () => { receiptModal.style.display = 'none'; });
        document.getElementById('close-detail-btn').addEventListener('click', () => { detailModal.style.display = 'none'; });

        document.getElementById('submit-btn').addEventListener('click', async () => {

            const target = document.getElementById('donation-target').value;
            const phoneMid = document.getElementById('phone-middle').value;
            const phoneLast = document.getElementById('phone-last').value;

                alert('휴대폰 번호를 정확히 입력해주세요.');
                return;
            }

            const phoneStr = `010-${phoneMid}-${phoneLast}`;
            const maskedPhone = `010-****-${phoneLast}`;
            const signatureDataUrl = canvas.toDataURL('image/png');

            try {
                await addDoc(collection(db, "donations"), {
                    phone: phoneStr,
                    maskedName: maskedPhone,
                    campaign: campaign,
                    target: target,
                    amount: "₩" + (Math.floor(Math.random() * 5 + 1) * 10000).toLocaleString(),
                    certNum: "대기중",
                    status: "승인대기",
                    signature: signatureDataUrl,
                    createdAt: serverTimestamp(),
                    timestamp: Date.now()
                });

                modal.style.display = 'none';
                document.getElementById('phone-middle').value = '';
                document.getElementById('phone-last').value = '';
                clearCanvas();
            } catch (e) {
                console.error("Error adding document: ", e);
                alert('저장 중 오류가 발생했습니다.');
            }
        });

        function renderTable(firestoreData) {
            listTable.innerHTML = '';
            const combined = [...firestoreData, ...dummyData].sort((a, b) => b.timestamp - a.timestamp);

            combined.forEach(data => {
                const tr = document.createElement('tr');
                if (!data.isDummy) {
                    tr.classList.add('clickable-row');
                    tr.addEventListener('click', () => {
                        document.getElementById('detail-phone').innerText = data.phone;
                        document.getElementById('detail-sig-img').src = data.signature;
                        detailModal.style.display = 'flex';
                    });
                }

                let certHtml = data.certNum;
                if (data.certNum === "UNI-2026-0982") {
                    certHtml = `<span class="cert-link" data-cert="receipt">UNI-2026-0982</span>`;
                }

                const statusClass = data.status === "기부 완료" ? "status-complete" : "status-pending";

                tr.innerHTML = `
                    <td>${data.maskedName || data.name}</td>
                    <td>${data.campaign}</td>
                    <td>${data.amount}</td>
                    <td>${data.target}</td>
                    <td>${certHtml}</td>

                realData.push({

                    timestamp: d.createdAt ? d.createdAt.toMillis() : Date.now()

                        amount: pAmount, certNum: pCert, status: "기부 완료", signature: "",

                    await setDoc(metaRef, { lastDate: today });
                }
            } catch(e) { console.log("Auto-add system error:", e); }
        }
        checkAndAutoAddDaily();
    </script>
