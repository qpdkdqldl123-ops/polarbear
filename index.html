<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나는 무죄인가? - 북극곰의 마지막 외침</title>
    <style>
        :root { --red: #ff4d4d; --ice: #e0f7fa; --deep: #01579b; --gold: #ffd700; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Apple SD Gothic Neo', sans-serif; color: #fff; }
        
        /* 눈 내리는 배경 (모든 페이지 공통) */
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        .page { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2; }
        .active { display: flex; }

        /* 배경음악 ON/OFF 버튼 */
        #music-ctrl {
            position: fixed; right: 20px; bottom: 20px; z-index: 1000;
            padding: 12px 25px; border-radius: 30px; background: rgba(255, 255, 255, 0.8);
            color: #333; font-weight: bold; cursor: pointer; border: 2px solid var(--deep);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s;
        }

        #page-start { background: url('마른 사진.png') no-repeat center center/contain; background-color: #000; align-items: flex-end; padding-right: 8%; }
        .start-title { font-size: 85px; font-weight: 900; color: var(--red); text-shadow: 5px 5px 25px #000; margin-bottom: 30px; }

        .btn-main { padding: 25px 80px; font-size: 28px; border-radius: 60px; border: none; background: linear-gradient(135deg, #ffffff 0%, #e0f7fa 100%); color: var(--deep); font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: 0.3s; }

        #page-quiz { background: linear-gradient(to bottom, #a2e4f6, #ffffff); color: #333; }
        .quiz-container { width: 85%; max-width: 850px; background: rgba(255,255,255,0.95); padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); z-index: 10; margin-top: -80px; transition: transform 2s ease-in, opacity 2s; }
        .env-impact { background: #f0faff; padding: 20px; border-radius: 20px; margin: 20px 0; font-size: 16px; line-height: 1.7; border-left: 8px solid var(--deep); }
        .impact-highlight { font-weight: bold; text-decoration: underline; color: #d32f2f; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { padding: 20px; border: 2px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; font-size: 18px; font-weight: bold; }

        .stepping-stones { position: absolute; bottom: 120px; width: 100%; display: flex; justify-content: space-around; padding: 0 40px; box-sizing: border-box; }
        .ice-block { width: 90px; height: 45px; background: #fff; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 1s; position: relative; }
        .fragment { position: absolute; width: 30px; height: 20px; background: #fff; border-radius: 5px; opacity: 1; transition: 1.2s ease-out; pointer-events: none; }
        
        /* 곰 기본 설정 (점프 가속도 반영) */
        .bear { position: absolute; z-index: 20; display: flex; flex-direction: column; align-items: center; transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1), bottom 0.3s cubic-bezier(0.42, 0, 0.58, 1), transform 0.25s ease-out, opacity 2s; }
        
        /* 곰 이미지와 눈물을 하나로 묶는 래퍼 */
        .img-wrapper { position: relative; display: inline-block; }
        
        /* 곰 숨쉬기 애니메이션 */
        .img-wrapper img { width: 100%; height: auto; display: block; transform-origin: bottom center; animation: breathe 3s ease-in-out infinite alternate; }
        @keyframes breathe { 0% { transform: scaleY(1); } 100% { transform: scaleY(1.03) scaleX(0.98); } }

        /* 눈물 CSS (곰 이미지 래퍼 안에서 절대좌표를 가짐) */
        .css-tear { position: absolute; background-color: #4fc3f7; border-radius: 50%; z-index: 30; animation: cry 1.5s infinite; pointer-events: none; }
        @keyframes cry { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(20px); opacity: 0; } }

        /* 파괴율 및 대사 팝업 */
        #destruction-popup { position: absolute; bottom: 330px; text-align: center; z-index: 100; transition: opacity 1.5s ease-out; opacity: 0; pointer-events: none; }
        .rate-text { font-size: 38px; font-weight: 900; color: var(--red); text-shadow: 2px 2px 4px #fff; }
        .shout-text { font-size: 26px; font-weight: bold; color: #333; text-shadow: 1px 1px 3px #fff; margin-top: 5px; }

        .shake-heavy { animation: shake-h 0.1s infinite; }
        @keyframes shake-h { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(5px, -5px); } }
        
        .halo { position: absolute; top: -25px; width: 50px; height: 12px; border: 4px solid var(--gold); border-radius: 50%; box-shadow: 0 0 15px var(--gold); }
        .soul { transition: bottom 8s linear, left 8s ease-in-out, opacity 2s; filter: brightness(1.8) opacity(0.6); }

        .result-scroll-area { width: 95%; max-height: 75vh; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .res-card { margin-bottom: 40px; padding: 35px; border-radius: 30px; background: #2a2a2a; line-height: 1.8; color: #eee; border: 1px solid #444; }
        .active-res { border: 6px solid var(--red) !important; position: relative; background: #3d1a1a; }
        .active-res::before { content: '나의 범죄'; position: absolute; top: -25px; left: 30px; background: var(--red); color: white; padding: 8px 25px; font-weight: bold; border-radius: 10px; }

        .dance-mama { animation: jump-mama 0.5s infinite alternate; }
        .dance-baby { animation: jump-baby 0.5s infinite alternate-reverse; }
        @keyframes jump-mama { from { transform: translateY(0); } to { transform: translateY(-60px); } }
        @keyframes jump-baby { from { transform: translateY(0); } to { transform: translateY(-80px); } }
        .bubble { position: absolute; top: -110px; background: white; border-radius: 25px; padding: 15px 30px; color: #000; font-weight: bold; font-size: 22px; white-space: nowrap; z-index: 100; }
    </style>
</head>
<body>

<audio id="bgm" loop><source src="배경음악.mp3" type="audio/mpeg"></audio>
<audio id="happy-bgm" loop><source src="긍정 노래.mp3" type="audio/mpeg"></audio>
<canvas id="snow-canvas"></canvas>
<button id="music-ctrl" onclick="App.toggleMusic()">배경음악 ON</button>

<div id="page-start" class="page active">
    <div class="start-title">나는 무죄인가?</div>
    <button class="btn-main" onclick="App.start()">북극곰 만나러 가기</button>
</div>

<div id="page-quiz" class="page">
    <div id="destruction-popup">
        <div class="rate-text" id="pop-rate"></div>
        <div class="shout-text" id="pop-shout"></div>
    </div>
    <div id="msg-popup" style="position: absolute; bottom: 320px; font-size: 32px; font-weight: bold; color: var(--red); opacity: 0; z-index: 100; text-shadow: 2px 2px 4px #fff; text-align: center;"></div>
    <div class="quiz-container" id="quiz-ui"></div>
    <div class="stepping-stones" id="stones-container"></div>
    
    <div id="baby-bear" class="bear" style="bottom: 165px; left: 5%;">
        <div class="img-wrapper" style="width: 80px;">
            <img src="bear.png" alt="새끼 북극곰">
            <div class="css-tear" style="width: 5px; height: 5px; top: 22%; left: 74%;"></div>
        </div>
    </div>

    <div id="mama-bear" class="bear" style="bottom: 120px; right: 5%;">
        <div class="img-wrapper" style="width: 140px; transform: scaleX(-1);">
            <img src="bear.png" alt="어미 북극곰">
            <div class="css-tear" style="width: 7px; height: 7px; top: 22%; left: 74%;"></div>
        </div>
    </div>
</div>

<div id="page-ending" class="page" style="background: #000; text-align: center;">
    <h1 style="color:var(--red); font-size: 45px; line-height: 1.6;">당신의 사소한 행동이<br>북극곰 가족을 사지로 몰아넣었습니다.</h1>
    <p style="color:white; font-size: 24px;">결국 북극곰 가족은 만나지 못하고 죽게 됐습니다.</p>
    <button class="btn-main" onclick="App.showResults()" style="margin-top: 50px;">당신은 어떤 이웃인가요?</button>
</div>

<div id="page-results" class="page" style="background: #111;">
    <div class="result-scroll-area" id="results-content"></div>
    <button class="btn-main" style="margin-top: 20px;" onclick="App.navigateTo('page-ask')">북극곰 살리러 가기</button>
</div>

<div id="page-ask" class="page" style="background: #000; text-align: center;">
    <h1 style="font-size: 55px; margin-bottom: 60px;">북극곰을 살리고 싶습니까?</h1>
    <div style="display: flex; gap: 40px;">
        <button class="btn-main" onclick="App.showDance()">예</button>
        <button class="btn-main" onclick="alert('결국 외면하시는군요...')">아니오</button>
    </div>
</div>

<div id="page-dance" class="page" style="background: linear-gradient(to bottom, #e1f5fe, #ffffff); color: #01579b;">
    <h1 style="font-size: 45px; text-align: center; position: absolute; top: 10%;">북극곰을 살리기 위해<br>가디언즈(직원들)를 불러주세요!</h1>
    <div id="dance-container" style="display: flex; gap: 80px; align-items: flex-end; margin-top: 100px;"></div>
    <button class="btn-main" style="position: absolute; bottom: 40px; right: 40px;" onclick="location.reload()">처음으로 돌아가기</button>
</div>

<script>
const QUESTIONS = [
    { q: "1. 읽지 않는 스팸 메일이나 오래된 메일을 쌓아둔다.", i: "이메일 1MB 저장 시 <span class='impact-highlight'>약 7g의 CO2가 배출</span>됩니다. 10통씩만 지워도 <span class='impact-highlight'>화력 발전소 수십 대</span>를 끄는 효과가 있으며, 이는 매년 <span class='impact-highlight'>수십만 톤의 빙하</span>를 지킵니다.", o: ["즉시 삭제", "가끔 삭제", "거의 안 지움", "수만 건 방치"], f: "서서히 갈라짐1" },
    { q: "2. 스마트폰 충전기를 사용하지 않을 때도 꽂아둔다.", i: "불필요한 대기 전력은 연간 <span class='impact-highlight'>약 30kg의 탄소를 배출</span>합니다. 이는 북극 해빙을 해마다 <span class='impact-highlight'>축구장 수천 개 넓이</span>만큼 녹여 <span class='impact-highlight'>새끼 북극곰이 쉴 곳</span>을 뺏습니다.", o: ["무조건 뽑음", "가끔 뽑음", "거의 안 뽑음", "항상 연결"], f: "서서히 갈라짐2" },
    { q: "3. 종이 영수증을 습관적으로 출력해서 받는다.", i: "영수증 1장당 <span class='impact-highlight'>약 15g의 탄소 발생</span>. 우리나라에서만 <span class='impact-highlight'>33만 그루의 나무</span>가 베어지며, 이는 북극곰을 <span class='impact-highlight'>굶주림으로 내모는 것</span>과 같습니다.", o: ["모바일 영수증", "가끔 받음", "습관적으로 받음", "무조건 받음"], f: "작게3" },
    { q: "4. 설거지를 할 때 물을 계속 틀어놓고 비누칠을 한다.", i: "15분간 물 틀면 <span class='impact-highlight'>약 180L의 물이 낭비</span>됩니다. 발생하는 온실가스는 <span class='impact-highlight'>해수면을 높여</span> 북극곰의 서식지를 <span class='impact-highlight'>직접적으로 수몰</span>시킵니다.", o: ["물을 받아서 함", "필요할 때만 켬", "자주 틀어둠", "계속 틀어둠"], f: "서서히 갈라짐4" },
    { q: "5. 유통기한이 지난 약을 일반 쓰레기통이나 하수구에 버린다.", i: "약 성분은 독성 물질이 되어 <span class='impact-highlight'>북극곰의 체내에 축적</span>됩니다. 이는 <span class='impact-highlight'>번식력을 떨어뜨리고 멸종을 가속화</span>하는 치명적 원인이 됩니다.", o: ["수거함 제출", "가끔 이용", "일반 쓰레기", "하수구 투기"], f: "좀 크게 갈라짐5" },
    { q: "6. 택배 박스의 테이프와 송장을 제거하지 않고 배출한다.", i: "유독가스와 탄소는 <span class='impact-highlight'>지구 온난화의 주범</span>이며, 빙하 해빙 속도를 <span class='impact-highlight'>자연보다 100배 이상 빠르게</span> 만들어 북극곰을 고립시킵니다.", o: ["완벽히 제거", "대충 제거", "가끔 제거", "전혀 안 함"], f: "작게6" },
    { q: "7. 음식을 먹을 때 종이 타월을 여러 장 쓴다.", i: "타월 1톤에 <span class='impact-highlight'>나무 17그루와 100톤의 물</span> 소모. 타월 한 장이 북극 온도를 높여 <span class='impact-highlight'>사냥 시간을 매년 3~5일씩</span> 앗아갑니다.", o: ["손수건", "1장", "2~3장", "뭉텅이"], f: "좀 크게7" },
    { q: "8. 배달 음식을 시킬 때 일회용 수저와 포크를 무심코 받는다.", i: "플라스틱 분해 <span class='impact-highlight'>500년 소요</span>. 생산 온실가스는 결국 빙하를 녹여 <span class='impact-highlight'>북극곰 가족이 얼음 조각에 매달려 표류</span>하게 만듭니다.", o: ["항상 안 받음", "가끔 체크", "거의 안 함", "무조건 받음"], f: "좀 크게8" },
    { q: "9. 세탁 시 섬유유연제를 향기를 위해 정량보다 많이 넣는다.", i: "미세 플라스틱은 <span class='impact-highlight'>북극해까지 도달</span>합니다. 이를 먹고 병든 물고기 때문에 북극곰은 <span class='impact-highlight'>면역력이 약해져 추위와 굶주림</span>을 견디지 못합니다.", o: ["정량 미만", "정량 준수", "조금 더", "듬뿍 넣음"], f: "크게9" },
    { q: "10. 도보 15분 이내의 짧은 거리도 습관적으로 차를 탄다.", i: "주행 1km당 <span class='impact-highlight'>약 140g의 탄소 배출</span>. 짧은 이동이 빙하를 녹여 북극곰이 <span class='impact-highlight'>민가 쓰레기통을 뒤지게</span> 만듭니다.", o: ["무조건 도보", "컨디션 따라", "자주 이용", "무조건 이용"], f: "크게10" }
];

const gameState = { current: 0, score: 0, lock: false, musicOn: true };
const bearQuotes = ["배고파...", "고통스러워....", "그만해....", "엄마 보고 싶어....", "집이 녹고 있어...", "살려주세요..."];

const App = {
    toggleMusic() {
        const bgm = document.getElementById('bgm');
        const btn = document.getElementById('music-ctrl');
        if (gameState.musicOn) { bgm.pause(); btn.innerText = "배경음악 OFF"; } 
        else { bgm.play(); btn.innerText = "배경음악 ON"; }
        gameState.musicOn = !gameState.musicOn;
    },

    start() {
        this.navigateTo('page-quiz');
        this.initSnow();
        this.initStones();
        this.renderQuiz();
        document.getElementById('bgm').play().catch(()=>{});
    },

    navigateTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    initSnow() {
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const flakes = Array.from({length: 150}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, d: Math.random()*1 }));
        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white"; ctx.beginPath();
            flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); });
            ctx.fill();
            flakes.forEach(f => { f.y += 2 + f.r/2; f.x += Math.sin(f.d); if(f.y > canvas.height) f.y = -10; });
            requestAnimationFrame(loop);
        }
        loop();
    },

    initStones() {
        const container = document.getElementById('stones-container');
        for(let i=0; i<10; i++) {
            let b = document.createElement('div'); b.className = 'ice-block'; b.id = `ice-${i}`;
            container.appendChild(b);
        }
        this.jumpBear(0);
    },

    jumpBear(idx) {
        const baby = document.getElementById('baby-bear');
        const stone = document.getElementById(`ice-${idx}`);
        const rect = stone.getBoundingClientRect();
        
        // 역동적인 점프 시작
        baby.style.bottom = "280px";
        baby.style.transform = "scaleY(1.1) rotate(5deg)";
        
        setTimeout(() => { 
            // 곰의 너비 80px의 절반인 40px을 빼주어 빙하 정중앙에 착지하도록 계산
            baby.style.left = (rect.left + rect.width/2 - 40) + "px"; 
            baby.style.bottom = "165px"; 
            // 착지 충격
            baby.style.transform = "scaleY(0.85) rotate(0deg)"; 
            
            setTimeout(() => {
                baby.style.transform = "scaleY(1) rotate(0deg)";
            }, 150);
        }, 250); 
    },

    renderQuiz() {
        const q = QUESTIONS[gameState.current];
        const ui = document.getElementById('quiz-ui');
        ui.innerHTML = `<p style="font-size:22px; font-weight:900; color:var(--deep)">질문: ${q.q.split('. ')[1]}</p><div class="env-impact"><b>환경 영향:</b> ${q.i}</div><div class="opt-grid">${q.o.map((opt, i) => `<button class="opt-btn" onclick="App.answer(${i+1})">${opt}</button>`).join('')}</div>`;
    },

    answer(point) {
        if(gameState.lock) return;

        const shakeIndices = [1, 2, 5, 7, 8]; 
        if (shakeIndices.includes(gameState.current)) {
            document.body.classList.add('shake-heavy');
            setTimeout(() => document.body.classList.remove('shake-heavy'), 500);
        }

        gameState.lock = true;
        gameState.score += point;
        const qData = QUESTIONS[gameState.current];
        new Audio(`${qData.f}.mp3`).play();

        const pop = document.getElementById('destruction-popup');
        document.getElementById('pop-rate').innerText = `빙하 파괴율: ${gameState.score * 4}%`;
        document.getElementById('pop-shout').innerText = bearQuotes[Math.floor(Math.random() * bearQuotes.length)];
        pop.style.left = document.getElementById('baby-bear').style.left;
        pop.style.opacity = 1;

        const ice = document.getElementById(`ice-${gameState.current}`);
        if(Math.random() > 0.5) ice.style.transform = "translateY(1200px) rotate(45deg)";
        else {
            for(let i=0; i<6; i++) {
                let frag = document.createElement('div'); frag.className = 'fragment';
                frag.style.left = ice.offsetLeft + 'px'; frag.style.top = ice.offsetTop + 'px';
                document.getElementById('page-quiz').appendChild(frag);
                setTimeout(() => { frag.style.transform = `translate(${(Math.random()-0.5)*1600}px, ${-Math.random()*1100}px) rotate(360deg)`; frag.style.opacity = '0'; }, 10);
                setTimeout(() => frag.remove(), 1200);
            }
            ice.style.opacity = "0";
        }

        setTimeout(() => { pop.style.opacity = 0; }, 1500);

        gameState.current++;
        if(gameState.current < 10) {
            setTimeout(() => { this.jumpBear(gameState.current); this.renderQuiz(); gameState.lock = false; }, 600);
        } else {
            this.triggerFinal();
        }
    },

    triggerFinal() {
        const popMsg = document.getElementById('msg-popup');
        popMsg.innerText = "엄마 만났다!"; popMsg.style.opacity = 1;
        
        setTimeout(() => {
            popMsg.innerText = "어.......???";
            document.body.classList.add('shake-heavy');
            
            setTimeout(() => { popMsg.innerText = "엄마!!!! 가지마!!!"; }, 1000);

            setTimeout(() => {
                document.body.classList.remove('shake-heavy');
                
                const quizBoard = document.querySelector('.quiz-container');
                if(quizBoard) {
                    quizBoard.style.transform = "translateY(1500px)";
                    quizBoard.style.opacity = "0";
                }
                
                // 추락 시 애니메이션 속도를 고정시켜 자연스럽게 떨어지도록 처리
                document.getElementById('baby-bear').style.transition = "transform 2s, opacity 2s";
                document.getElementById('mama-bear').style.transition = "transform 2s, opacity 2s";
                
                document.getElementById('baby-bear').style.transform = "translateY(1500px)";
                document.getElementById('mama-bear').style.transform = "translateY(1500px)";
                document.querySelectorAll('.ice-block').forEach(b => b.style.transform = "translateY(1500px)");
                
                setTimeout(() => this.ascend(), 1500);
            }, 2500);
        }, 1300);
    },

    ascend() {
        const qPage = document.getElementById('page-quiz');
        const mBody = document.getElementById('mama-bear').innerHTML;
        const bBody = document.getElementById('baby-bear').innerHTML;
        qPage.innerHTML += `<div id="s-m" class="bear soul" style="bottom:-300px; right:25%;"><div class="halo"></div>${mBody}</div>
                           <div id="s-b" class="bear soul" style="bottom:-300px; left:25%;"><div class="halo"></div>${bBody}</div>`;
        setTimeout(() => {
            const sm = document.getElementById('s-m'); const sb = document.getElementById('s-b');
            sm.style.bottom = "85%"; sm.style.right = "35%";
            sb.style.bottom = "80%"; sb.style.left = "35%";
        }, 200);
        setTimeout(() => this.navigateTo('page-ending'), 9000);
    },

    showResults() {
        this.navigateTo('page-results');
        const s = gameState.score;
        const R = [
            { range: [36, 40], title: "🔴 36~40점: [환경 연쇄 살인마] \"북극곰 가정 파괴범\"", text: `파괴 수위: 연간 탄소 배출량 약 2.2톤 이상. 이는 매년 <span class="impact-highlight">축구장 5개 넓이의 빙하를 완전히 증발</span>시키는 수치입니다.<br><br>북극곰에게 주는 피해: * <span class="impact-highlight">당신의 생활 방식은 북극곰의 사냥 기간을 연간 24일 단축</span>시킵니다.<br><br>과학계에 따르면 사냥 기간이 20일 줄어들 때마다 <span class="impact-highlight">성체 북극곰의 체중은 30kg 이상 급감</span>합니다. 결국 어미 곰의 체지방률이 20% 미만으로 떨어져 <span class="impact-highlight">젖이 나오지 않게 되고, 이는 새끼 북극곰의 80%가 1년 안에 아사</span>하는 직접적 원인이 됩니다.` },
            { range: [31, 35], title: "🟠 31~35점: [환경 상습 폭행범] \"빙하 파괴의 주역\"", text: `파괴 수위: 연간 약 1.5톤. 소나무 200그루의 평생 흡수량입니다.<br><br>북극곰에게 주는 피해: * <span class="impact-highlight">당신이 배출한 탄소는 매년 약 45㎡(약 14평)의 얼음판</span>을 녹여 종잇장처럼 만듭니다.<br><br>이로 인해 북극곰은 먹이를 찾기 위해 전보다 <span class="impact-highlight">평균 150km를 더 헤엄</span>쳐야 합니다. 체력이 소진된 북극곰의 <span class="impact-highlight">익사율은 이전보다 50% 이상 증가</span>하며, 당신의 행동이 북극곰을 바다 한가운데서 <span class="impact-highlight">탈진해 죽게 만드는 보이지 않는 손</span>이 됩니다.` },
            { range: [26, 30], title: "🟡 26~30점: [환경 과실 치사범] \"무심코 던진 돌에 맞는 생태계\"", text: `파괴 수위: 연간 약 1.1톤. 북극해 얼음 두께를 매년 수 센티미터씩 얇게 만듭니다.<br><br>북극곰에게 주는 피해: * 얼음이 일찍 녹으면서 주식인 바다표범 대신 육지 쓰레기를 뒤지지만, 이는 필요 열량의 <span class="impact-highlight">단 7%</span>밖에 채우지 못합니다.<br><br>또한 당신이 배출한 미세 플라스틱은 <span class="impact-highlight">호르몬 체계를 25% 이상 교란</span>시켜 번식 성공률을 떨어뜨리고 북극곰을 '굶주린 부랑자'로 전락시키고 있습니다.` },
            { range: [21, 25], title: "🟢 21~25점: [환경 방조범] \"지켜보는 척하며 발판을 치우는 자\"", text: `파괴 수위: 연간 0.5톤 이하. 나름의 노력을 하지만 탄소를 배출 중입니다.<br><br>북극곰에게 주는 피해: * <span class="impact-highlight">매년 15㎡(약 4.5평)의 빙하가 보존</span>됩니다. 이는 가족이 <span class="impact-highlight">약 120시간(5일) 동안 더 안전하게 머물며 에너지를 비축할 수 있는 소중한 공간</span>입니다. 하지만 여전히 발생하는 탄소는 민가 쓰레기통을 뒤지는 빈도를 <span class="impact-highlight">매년 2~3회씩 높이는 잠재적 위협</span>이 됩니다.` },
            { range: [10, 20], title: "🔵 10~20점: [지구 명예 가디언] \"북극곰의 유일한 희망\"", text: `파괴 수위: 탄소 발자국 최소화 실천자.<br><br>북극곰에게 주는 피해: * 당신의 철저한 습관은 <span class="impact-highlight">매년 축구장 절반 넓이의 빙하 결빙 속도를 늦추는 효과</span>가 있습니다.<br><br>당신 덕분에 <span class="impact-highlight">새끼 북극곰이 성체로 자랄 확률이 12.5% 상승</span>합니다. 당신은 북극곰에게 단순한 인간이 아니라, 무너져가는 그들의 <span class="impact-highlight">집을 수리해 주는 유일한 '가족'</span>입니다.` }
        ];
        document.getElementById('results-content').innerHTML = R.map(r => `<div class="res-card ${s>=r.range[0]&&s<=r.range[1]?'active-res':''}"><h3>${r.title}</h3><p>${r.text}</p></div>`).join('');
    },

    showDance() {
        this.navigateTo('page-dance');
        document.getElementById('bgm').pause(); document.getElementById('happy-bgm').play();
        const container = document.getElementById('dance-container');
        const m = document.getElementById('mama-bear').cloneNode(true);
        const b = document.getElementById('baby-bear').cloneNode(true);
        [m, b].forEach((bear, i) => {
            bear.style.position = 'relative'; bear.style.left = '0'; bear.style.bottom = '0';
            bear.classList.add(i===0?'dance-mama':'dance-baby');
            // 해피엔딩이므로 눈물 제거
            bear.querySelectorAll('.css-tear').forEach(t => t.remove());
            container.appendChild(bear);
        });
        const quotes = ["나를 살려줘서 고마워!!", "옳은 선택을 해줘서 고마워!!", "고맙다 닝겐아!!", "함께 행복해요!!"];
        const bubble = document.createElement('div'); bubble.className = 'bubble'; b.appendChild(bubble);
        bubble.innerText = quotes[0];
        setInterval(() => { bubble.innerText = quotes[Math.floor(Math.random()*quotes.length)]; }, 1000);
    }
};

window.onload = () => { document.getElementById('bgm').play().catch(()=>{}); };
</script>
</body>
